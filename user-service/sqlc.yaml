version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries/queries.sql"
    schema: "sql/migrations"
    gen:
      go:
        package: "database"
        out: "internal/database"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
